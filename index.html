<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KABOSA-TEST</title>

  <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  <section id="my-products" style="padding: 50px 20px; text-align: center; background-color: #1a1a1a; color: white;">
    <h2 style="font-size: 2.5rem; margin-bottom: 40px; color: #00ffff;">منتجاتي (3D Printed Figures)</h2>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto;">
        
        <div style="border: 1px solid #333; padding: 15px; border-radius: 10px; background: #222;">
            <img src="images/product1.jpg" alt="Figure 1" style="width: 100%; border-radius: 8px; margin-bottom: 15px;">
            <h3>اسم الفيجر هنا</h3>
            <p style="color: #ccc;">المقاس: 15*20 سم</p>
            <p style="font-weight: bold; color: #00ffff;">السعر: 500 ج.م</p>
            <button style="background: #00ffff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">طلب عبر واتساب</button>
        </div>

        <div style="border: 1px solid #333; padding: 15px; border-radius: 10px; background: #222;">
            <img src="images/product2.jpg" alt="Figure 2" style="width: 100%; border-radius: 8px; margin-bottom: 15px;">
            <h3>اسم الفيجر هنا</h3>
            <p style="color: #ccc;">المقاس: 10*15 سم</p>
            <p style="font-weight: bold; color: #00ffff;">السعر: 350 ج.م</p>
            <button style="background: #00ffff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">طلب عبر واتساب</button>
        </div>

    </div>
</section>
